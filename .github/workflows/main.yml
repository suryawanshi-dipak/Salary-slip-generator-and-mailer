name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          java-package: jdk

      - name: Add WiX Toolset to PATH
        shell: pwsh
        run: |
          $wix = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($wix) {
            "$($wix.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "WiX found at: $($wix.FullName)\bin"
          } else {
            Write-Error "WiX Toolset not found. jpackage --type exe requires WiX 3.x."
            exit 1
          }

      - name: Resolve version
        id: version
        shell: bash
        run: |
          version="1.0.0"
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Inject build version into source
        shell: bash
        run: |
          sed -i "s/CURRENT_VERSION = \"[^\"]*\"/CURRENT_VERSION = \"${{ steps.version.outputs.value }}\"/" src/main/java/Utils/GitUtils.java

      - name: Build fat JAR with Maven
        shell: bash
        run: mvn -B -q package

      - name: Stage jar for jpackage
        shell: bash
        run: |
          mkdir -p build/libs
          cp target/salary-slip-generator.jar build/libs/SalarySlipGenerator.jar

      - name: Stage DATA content for the installer
        shell: bash
        run: |
          # TODO(before public release): DATA/smtp.properties holds real SMTP
          # credentials and is bundled as-is while this repo/its releases stay
          # private. Before making the repo or any release public, switch this
          # to writing the file from GitHub Actions secrets instead (see
          # DATA/smtp.properties.example for the expected format) so the
          # plaintext password never ships inside a downloadable artifact.
          mkdir -p package-data/DATA
          cp DATA/logo.jpg package-data/DATA/
          cp DATA/smtp.properties package-data/DATA/

      - name: Build Windows EXE installer
        shell: bash
        run: |
          mkdir -p dist
          jpackage \
            --type exe \
            --name SalarySlipGenerator \
            --app-version "${{ steps.version.outputs.value }}" \
            --vendor "dipakcode1710" \
            --description "Salary Slip Generator and Mailer" \
            --input build/libs \
            --main-jar SalarySlipGenerator.jar \
            --main-class UI.SalarySlipGenerator \
            --app-content package-data/DATA \
            --icon DATA/app-icon.ico \
            --dest dist \
            --win-menu \
            --win-shortcut \
            --win-dir-chooser \
            --java-options "-Dfile.encoding=UTF-8"

      - name: Copy JAR to dist for release (used by in-app auto-updater)
        shell: bash
        run: cp build/libs/SalarySlipGenerator.jar "dist/SalarySlipGenerator-${{ steps.version.outputs.value }}.jar"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SalarySlipGenerator-windows-exe-${{ steps.version.outputs.value }}
          path: dist/*.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: SalarySlipGenerator v${{ steps.version.outputs.value }}
          files: |
            dist/*.exe
            dist/*.jar
          generate_release_notes: true
          draft: false
          prerelease: false
